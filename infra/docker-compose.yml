services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: domain_admin
      POSTGRES_USER: domain_admin
      POSTGRES_PASSWORD: domain_admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      DJANGO_SECRET_KEY: change-me-backend-secret
      DJANGO_DEBUG: "1"
      POSTGRES_DB: domain_admin
      POSTGRES_USER: domain_admin
      POSTGRES_PASSWORD: domain_admin
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DOMAIN_AGENT_DEFAULT_SECRET: change-me-agent-secret
      DOMAIN_AGENT_TIMEOUT: "120"
      # URL интерфейса панели для curl с других машин (хост:порт Next.js).
      PANEL_PUBLIC_BASE_URL: ${PANEL_PUBLIC_BASE_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3100,http://127.0.0.1:3100
      # Первый вход в панель при пустой БД (смените пароль после развёртывания).
      PANEL_BOOTSTRAP_USERNAME: admin
      PANEL_BOOTSTRAP_PASSWORD: change-me-panel-admin
      # 1 = при каждом старте backend после migrate очистить серверы/задачи/шаблоны/аудит (User не трогаем).
      # Пересборка образа БД не чистит — только том postgres, эта опция или: docker compose exec backend python manage.py purge_panel_data
      PANEL_PURGE_DOMAIN_ON_STARTUP: ${PANEL_PURGE_DOMAIN_ON_STARTUP:-0}
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      DJANGO_SECRET_KEY: change-me-backend-secret
      POSTGRES_DB: domain_admin
      POSTGRES_USER: domain_admin
      POSTGRES_PASSWORD: domain_admin
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DOMAIN_AGENT_DEFAULT_SECRET: change-me-agent-secret
      DOMAIN_AGENT_TIMEOUT: "120"
    command: celery -A config worker -l info
    depends_on:
      - postgres
      - redis

  agent:
    build:
      context: ../agent
    environment:
      AGENT_SHARED_SECRET: change-me-agent-secret
      AGENT_DEFAULT_DOMAIN_DNS: test.alt
      AGENT_DEFAULT_REALM: TEST.ALT
      AGENT_PRIMARY_DC_IP: 192.168.77.10
      # smbcacls //host/share — тот же хост, что и DC (иначе в контейнере уходит на 127.0.0.1).
      AGENT_SMB_HOST: 192.168.77.10
    ports:
      - "8090:8090"

  # UI: после правок исходников обязательно пересобрать образ, иначе браузер получит старый JS:
  #   docker compose build --no-cache frontend && docker compose up -d frontend
  frontend:
    build:
      context: ../frontend
      args:
        APP_BUILD: ${APP_BUILD:-}
    environment:
      INTERNAL_API_URL: http://backend:8000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
